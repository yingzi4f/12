server:
  port: 5000
  servlet:
    context-path: /api
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3309/hangkong?serverTimezone=GMT%2B8&useSSL=false&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    property-naming-strategy: CAMEL_CASE_TO_LOWER_CASE_WITH_UNDERSCORES
    default-property-inclusion: ALWAYS
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

#连接hdfs的uri
hdfs:
  uri: //192.168.108.128:9000
  flight-data-path: E:/myHadoop/uploadFile/
  file-save-path: http://localhost:8080/localFile
  #拟使用用户  与上传到hdfs中目录有关  如/user/root
  user: root